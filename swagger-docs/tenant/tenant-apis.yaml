components:
  schemas:
    Tenantrequestbody:
      description: Tenant request body of POST API
      type: object
      properties:
        TenantInput1:
          type: string
          description: Tenant description of input1
        TenantInput2:
          type: string
          description: Tenant description of input2
    Tenantresponse:
      description: Tenant response of the API
      type: object
      properties:
        TenantRequiredField:
          type: string
          description: Tenant description of TenantRequiredField
        field2:
          type: string
        field3:
          type: object
    TeamAttribute:
      description: Team attribute schema (skills, values, milestones, metrics)
      type: object
      properties:
        attributeId:
          type: string
          description: Unique identifier for the attribute (format ATTR-{uuid})
          example: "ATTR-123e4567-e89b-12d3-a456-426614174000"
        teamId:
          type: string
          description: Team identifier (format TEAM-{id})
          example: "TEAM-abc123"
        attributeType:
          type: string
          enum:
            - SKILL
            - VALUE
            - MILESTONE
            - METRIC
          description: Type of attribute
          example: "SKILL"
        name:
          type: string
          description: Display name of the attribute
          maxLength: 100
          example: "Leadership"
        description:
          type: string
          description: Detailed description of the attribute
          maxLength: 500
          example: "Demonstrated ability to lead and inspire team members"
        isDefault:
          type: boolean
          description: Whether this is a system-created default attribute
          example: true
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of creation
          example: "2026-01-15T10:00:00Z"
        createdBy:
          type: string
          description: Username of the creator
          example: "john.doe"
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of last update
          example: "2026-01-15T10:00:00Z"
    errorbody:
      type: object
      properties:
        errorText:
          type: string

    # --------------- Organization Management Schemas ---------------
    
    CreateOrganizationRequest:
      type: object
      required:
        - organizationName
        - subscriptionPlan
        - billingCycle
      properties:
        organizationName:
          type: string
          minLength: 3
          maxLength: 100
          description: Official organization name
        displayName:
          type: string
          maxLength: 50
          description: Display name for the organization
        industry:
          type: string
          maxLength: 50
          description: Industry category
        description:
          type: string
          maxLength: 500
          description: Organization description
        clientDetails:
          $ref: '#/components/schemas/ClientDetails'
        subscriptionPlan:
          type: string
          enum: [BASIC, PROFESSIONAL, ENTERPRISE]
          description: Initial subscription plan
        billingCycle:
          type: string
          enum: [MONTHLY, YEARLY]
          description: Billing cycle preference

    ClientDetails:
      type: object
      properties:
        companySize:
          type: string
          enum: ["1-10", "11-50", "51-200", "201-1000", "1000+"]
          description: Number of employees
        headquarters:
          type: string
          maxLength: 100
          description: Primary business location
        website:
          type: string
          format: uri
          description: Company website URL
        primaryContact:
          $ref: '#/components/schemas/ContactInfo'
        businessType:
          type: string
          enum: [B2B, B2C, B2B2C]
          description: Business model type
        annualRevenue:
          type: string
          enum: ["<$1M", "$1M-10M", "$10M-50M", "$50M-100M", "$100M+"]
          description: Annual revenue range

    ContactInfo:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20

    UpdateOrganizationRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 50
        industry:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 500
        clientDetails:
          $ref: '#/components/schemas/ClientDetails'

    CreateOrganizationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        organizationId:
          type: string
          description: Unique identifier for the created organization
        data:
          $ref: '#/components/schemas/OrganizationResponse'

    OrganizationResponse:
      type: object
      properties:
        organizationId:
          type: string
        organizationName:
          type: string
        displayName:
          type: string
        industry:
          type: string
        description:
          type: string
        clientDetails:
          $ref: '#/components/schemas/ClientDetails'
        planType:
          type: string
          enum: [BASIC, PROFESSIONAL, ENTERPRISE]
        billingCycle:
          type: string
          enum: [MONTHLY, YEARLY]
        teamLimit:
          type: integer
          description: Maximum teams allowed
        currentTeamCount:
          type: integer
          description: Current number of teams
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        admins:
          type: array
          items:
            type: string
          description: List of admin user IDs
        activePromoCode:
          type: string
          nullable: true
          description: Currently active promo code

    OrganizationListResponse:
      type: object
      properties:
        success:
          type: boolean
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationSummary'

    OrganizationSummary:
      type: object
      properties:
        organizationId:
          type: string
        organizationName:
          type: string
        displayName:
          type: string
        industry:
          type: string
        planType:
          type: string
        currentTeamCount:
          type: integer
        teamLimit:
          type: integer
        isActive:
          type: boolean
        role:
          type: string
          enum: [ADMIN]
          description: User's role in the organization

    SubscriptionPlansResponse:
      type: object
      properties:
        success:
          type: boolean
        currentPlan:
          $ref: '#/components/schemas/SubscriptionDetails'
        availablePlans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'

    SubscriptionDetails:
      type: object
      properties:
        planType:
          type: string
        billingCycle:
          type: string
        price:
          type: number
        teamLimit:
          type: integer
        isActive:
          type: boolean
        nextBillingDate:
          type: string
          format: date-time

    SubscriptionPlan:
      type: object
      properties:
        planType:
          type: string
          enum: [BASIC, PROFESSIONAL, ENTERPRISE]
        features:
          type: array
          items:
            type: string
        teamLimit:
          type: integer
        pricing:
          type: object
          properties:
            monthly:
              type: number
            yearly:
              type: number
            yearlyDiscount:
              type: number
              description: Percentage discount for yearly billing

    UpdateSubscriptionRequest:
      type: object
      required:
        - planType
        - billingCycle
      properties:
        planType:
          type: string
          enum: [BASIC, PROFESSIONAL, ENTERPRISE]
        billingCycle:
          type: string
          enum: [MONTHLY, YEARLY]

    SubscriptionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        subscription:
          $ref: '#/components/schemas/SubscriptionDetails'

    ApplyPromoCodeRequest:
      type: object
      required:
        - promoCode
      properties:
        promoCode:
          type: string
          minLength: 3
          maxLength: 20
          description: Promotional code to apply

    PromoCodeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        promoDetails:
          type: object
          properties:
            promoCode:
              type: string
            discountType:
              type: string
              enum: [PERCENTAGE, FREE_TRIAL]
            discountValue:
              type: number
              description: Percentage off or trial days
            description:
              type: string
            expiresAt:
              type: string
              format: date-time
            isActive:
              type: boolean

    OrganizationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message

