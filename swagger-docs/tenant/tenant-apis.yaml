openapi: 3.0.0
info:
  title: "Tenant Portal APIs"
  description: Tenant API POC
  version: 1.0.1
x-amazon-apigateway-request-validators:
  all:
    validateRequestBody: true
x-amazon-apigateway-request-validator: all
paths:
  
# ---------- Teams Management APIs ----------

  /v2/teams:
    get:
      summary: List all teams for the current user
      description: Returns all teams the user is a member of, including their role and current team status
      produces:
        - application/json
      parameters:
        - name: currentTeam
          in: query
          description: ID of the team the user is currently logged into
          required: false
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListUserTeamsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []
    post:
      summary: Create a new team
      description: Creates a new team with the requesting user as the admin
      consumes:
        - application/json
      produces:
        - application/json
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateTeamLambda.Arn}/invocations
        responses:
          default:
            statusCode: "201"
      security:
        - UserPool: []

  /v2/teams/organization:
    get:
      summary: List all teams in organization (org admin only)
      description: Returns all teams in the organization that the user is an admin of. Only accessible by organization admins.
      produces:
        - application/json
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListOrgTeamsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/teams/{teamId}:
    get:
      summary: Get team details
      description: Returns detailed information about a specific team
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamOperationsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/teams/{teamId}/status:
    patch:
      summary: Update team status
      description: Activate or deactivate a team (admin only)
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamOperationsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/teams/{teamId}/members:
    get:
      summary: Get team members
      description: Returns all members of a team with their roles
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamOperationsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []
    post:
      summary: Add members to team
      description: Add new members to a team (admin only)
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamOperationsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/teams/{teamId}/members/{username}/role:
    post:
      summary: Update member role
      description: Update a team member's role to ADMIN or MEMBER (admin only)
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
        - name: username
          in: path
          description: Username of the member
          required: true
          type: string
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamOperationsLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/user/current-team:
    patch:
      summary: Set current team
      description: Update the user's currently logged-in team. User must be a member of the team.
      consumes:
        - application/json
      produces:
        - application/json
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SetCurrentTeamLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  # ---------- Team Attributes APIs (Skills, Values, Milestones, Metrics) ----------

  /v2/teams/{teamId}/attributes:
    get:
      summary: List team attributes
      description: Get all attributes (skills, values, milestones, metrics) for a specific team. All team members can access.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
        - name: type
          in: query
          description: Filter by attribute type (SKILL, VALUE, MILESTONE, METRIC)
          required: false
          type: string
          enum:
            - SKILL
            - VALUE
            - MILESTONE
            - METRIC
      responses:
        200:
          description: Successful response
          schema:
            type: object
            properties:
              teamId:
                type: string
                description: Team ID
              attributes:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamAttribute'
                  values:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamAttribute'
                  milestones:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamAttribute'
                  metrics:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamAttribute'
              total:
                type: integer
                description: Total number of attributes
        403:
          description: User is not a member of this team
        404:
          description: Team not found
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamAttributesLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

    post:
      summary: Create custom team attribute
      description: Create a new custom attribute for a team. Only team admins can create attributes.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - attributeType
              - name
            properties:
              attributeType:
                type: string
                enum:
                  - SKILL
                  - VALUE
                  - MILESTONE
                  - METRIC
                description: Type of attribute to create
              name:
                type: string
                description: Name of the attribute
                maxLength: 100
              description:
                type: string
                description: Description of the attribute
                maxLength: 500
      responses:
        201:
          description: Attribute created successfully
          schema:
            type: object
            properties:
              message:
                type: string
              attribute:
                $ref: '#/components/schemas/TeamAttribute'
        400:
          description: Invalid request body or attribute type
        403:
          description: Only team admins can create attributes
        404:
          description: Team not found
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamAttributesLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  /v2/teams/{teamId}/attributes/{attributeId}:
    patch:
      summary: Update custom team attribute
      description: Update an existing custom attribute for a team. Only team admins can update attributes. Default attributes cannot be updated.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
        - name: attributeId
          in: path
          description: Attribute ID to update
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name:
                type: string
                description: Updated name of the attribute
                maxLength: 100
              description:
                type: string
                description: Updated description of the attribute
                maxLength: 500
            minProperties: 1
            additionalProperties: false
      responses:
        200:
          description: Attribute updated successfully
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Attribute updated successfully"
              attribute:
                $ref: '#/components/schemas/TeamAttribute'
        400:
          description: Invalid request body or no fields provided
          schema:
            type: object
            properties:
              error:
                type: string
                example: "At least one field (name or description) must be provided for update"
        403:
          description: Only team admins can update attributes
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Only team admins can update custom attributes"
        404:
          description: Attribute or team not found
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Attribute not found"
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamAttributesLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

    delete:
      summary: Delete custom team attribute
      description: Delete a custom attribute from a team. Only team admins can delete attributes. Default attributes cannot be deleted.
      produces:
        - application/json
      parameters:
        - name: teamId
          in: path
          description: Team ID
          required: true
          type: string
        - name: attributeId
          in: path
          description: Attribute ID to delete
          required: true
          type: string
      responses:
        200:
          description: Attribute deleted successfully
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Attribute deleted successfully"
              attributeId:
                type: string
                example: "ATTR-123e4567-e89b-12d3-a456-426614174000"
              deletedBy:
                type: string
                example: "john.doe"
        403:
          description: Only team admins can delete attributes
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Only team admins can delete custom attributes"
        404:
          description: Attribute or team not found
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Attribute not found"
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageTeamAttributesLambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  # ---------- Employee Profile V2 APIs ----------

  /v2/profile:
    options:
      summary: CORS preflight request
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageEmployeeProfileV2Lambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
    get:
      summary: Get user profile information
      description: Returns basic profile information for the authenticated user
      produces:
        - application/json
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageEmployeeProfileV2Lambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []
    patch:
      summary: Update user profile information
      description: Update phone number, designation, display name, and/or profile picture
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PhoneNumber:
                  type: string
                  description: User's phone number
                  example: "+1234567890"
                Designation:
                  type: string
                  description: User's job title or designation
                  example: "Senior Developer"
                DisplayName:
                  type: string
                  description: User's display name (updates both DDB and Cognito)
                  example: "John Doe"
                ProfilePic:
                  type: string
                  description: Base64 encoded profile picture
                  example: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
            examples:
              update_phone:
                summary: Update phone number only
                value:
                  PhoneNumber: "+1234567890"
              update_all:
                summary: Update multiple fields
                value:
                  PhoneNumber: "+1234567890"
                  Designation: "Senior Developer"
                  DisplayName: "John Doe"
      x-amazon-apigateway-integration:
        type: AWS_PROXY
        httpMethod: POST
        passthroughBehavior: WHEN_NO_MATCH
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ManageEmployeeProfileV2Lambda.Arn}/invocations
        responses:
          default:
            statusCode: "200"
      security:
        - UserPool: []

  # --------------- Organization Management Endpoints ---------------
  
  /v2/organization:
    options:
      summary: CORS support
