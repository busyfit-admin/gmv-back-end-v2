  # ---------- Lambda to send invitation emails ----------

  SendInvitationsLambda:
    Type: AWS::Serverless::Function
    Properties:
      Description: "Lambda to send invitation emails to multiple recipients with HTML formatting"
      Role: !GetAtt OrganizationLambdaRole.Arn
      Handler: bootstrap
      Runtime: provided.al2
      Architectures:
        - x86_64
      Timeout: 300
      CodeUri: ../../lambdas/tenant-lambdas/org-module/send-invitations/
      Tracing: Active
      Environment:
        Variables:
          Environment: !Ref Environment
          ORGANIZATION_TABLE: !Ref OrgsTable
          EMPLOYEE_TABLE: !Ref EmployeeDataTable
          EMPLOYEE_TABLE_COGNITO_ID_INDEX: !GetAtt DDBEmployeeDataTableCognitoIdIndex.Value
          TENANT_TEAMS_TABLE: !Ref TenantTeamsTableV2
          PROMO_CODES_TABLE: !Ref PromoCodesTable
          # Email Configuration: Used by AWS SES to send invitation emails
          # The sender email (DEFAULT_FROM_EMAIL) must be verified in AWS SES
          # To verify domain: aws ses verify-domain-identity --domain mvp-dev.4cl-tech.com.au --region ap-southeast-2
          # Add the verification TXT record to Route 53 DNS settings
          # For production, also configure DKIM and SPF records for better deliverability
          DEFAULT_FROM_EMAIL: !FindInMap [AccountMappings, !Ref "AWS::AccountId", DefaultFromEmail]
          DEFAULT_FROM_NAME: !FindInMap [AccountMappings, !Ref "AWS::AccountId", DefaultFromName]
          # Base URL for invitation links, configurable per environment
          APP_BASE_URL: !FindInMap [AccountMappings, !Ref "AWS::AccountId", AppBaseURL]
          # JWT Secret for generating secure invitation tokens
          # All invitation data (email, org, team, role) is encoded in the JWT
          # This prevents URL manipulation and keeps sensitive data secure
          INVITATION_TOKEN_SECRET: !FindInMap [AccountMappings, !Ref "AWS::AccountId", InvitationTokenSecret]

  SendInvitationsLambdaInvokePermissions:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SendInvitationsLambda.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TenantAPIGateway}/*

